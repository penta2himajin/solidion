<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solidion Example — Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #ccc;
      overflow: hidden;
    }
    #game-container {
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(100, 180, 255, 0.12);
      max-width: 100vw;
      max-height: 100vh;
      touch-action: none;
    }
    .footer {
      margin-top: 12px;
      font-size: 12px;
      color: #444;
    }
    .footer a { color: #7fdbca; text-decoration: none; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <p class="footer">
    Built with <a href="https://github.com/penta2himajin/solidion">Solidion</a>
    — SolidJS signals driving Phaser 3 GameObjects
  </p>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
