<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solidion Example — Aquarium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050520;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #ccc;
      overflow: hidden;
    }
    #game-container {
      border-radius: 8px;
      overflow: hidden;

    #game-container canvas {
      max-width: 100% !important;
      height: auto !important;

    .footer {
      margin-top: 12px;
      font-size: 12px;
      color: #334;
    }
    .footer a { color: #4488cc; text-decoration: none; }
  </style>
  <script type="module" crossorigin src="/assets/index-BgpkcOOV.js"></script>

<body>
  <div id="game-container"></div>
  <p class="footer">

    — SolidJS signals driving Phaser 3 GameObjects
  </p>

</html>
